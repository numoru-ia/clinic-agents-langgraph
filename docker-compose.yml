version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic
    ports: ["5432:5432"]
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports: ["6333:6333"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: postgres12
      POSTGRES_SEEDS: postgres
      POSTGRES_PWD: clinic
    depends_on: [postgres]
    ports: ["7233:7233"]
